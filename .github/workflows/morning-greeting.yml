name: daily-morning
on:
  workflow_dispatch:
    inputs:
      city:
        default: "Beijing"
      style:
        default: "warm"
      llm_base_url:
        default: "https://api.deepseek.com/v1"
      llm_model:
        default: "deepseek-chat"
env:
  CITY: ${{ github.event.inputs.city || 'Beijing' }}
  LLM_BASE_URL: ${{ github.event.inputs.llm_base_url || 'https://api.deepseek.com/v1' }}
  LLM_MODEL: ${{ github.event.inputs.llm_model || 'deepseek-chat' }}
  OUTPUT_DIR: ${{ github.workspace }}/output
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install httpx && sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg 2>/dev/null
      - run: python scripts/generate_script.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_BASE_URL: ${{ env.LLM_BASE_URL }}
          LLM_MODEL: ${{ env.LLM_MODEL }}
      - run: python scripts/tts.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - run: python scripts/compose_video.py