name: УПШедчАВздЖЏЩњГЩгыЗЂВМ

on:
  schedule:
    # ББОЉЪБМф 05:30 = UTC 21:30
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      city:
        description: ГЧЪа
        required: false
        default: "ББОЉ"
      style:
        description: ЮФАИЗчИё
        required: false
        default: "ЮТХЏжЮгњ"
      llm_base_url:
        description: "LLM API ЕижЗЃЈdeepseek гУ https://api.deepseek.com/v1ЃЉ"
        required: false
        default: ""
      llm_model:
        description: "LLM ФЃаЭЃЈdeepseek гУ deepseek-chatЃЉ"
        required: false
        default: ""
      platforms:
        description: ЗЂВМЦНЬЈЃЈЖККХЗжИєЃЉ
        required: false
        default: "bilibili,youtube,douyin,xiaohongshu"

permissions:
  contents: write

env:
  OUTPUT_DIR: ${{ github.workspace }}/output
  CITY: ${{ github.event.inputs.city || 'ББОЉ' }}
  STYLE: ${{ github.event.inputs.style || 'ЮТХЏжЮгњ' }}
  LLM_BASE_URL: ${{ github.event.inputs.llm_base_url || secrets.LLM_BASE_URL || 'https://api.openai.com/v1' }}
  LLM_MODEL: ${{ github.event.inputs.llm_model || secrets.LLM_MODEL || 'gpt-4o-mini' }}
  PLATFORMS: ${{ github.event.inputs.platforms || 'bilibili,youtube,douyin,xiaohongshu' }}

jobs:
  generate-morning-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: МьГіВжПт
        uses: actions/checkout@v4

      - name: ЩшжУ Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: АВзА Python вРРЕ
        run: |
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium

      - name: АВзАЯЕЭГвРРЕ
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            fonts-wqy-microhei \
            fonts-wqy-zenhei \
            libnss3 libnspr4 libatk-bridge2.0-0 \
            libdrm2 libxkbcommon0 libgbm1 \
            2>/dev/null

      - name: ДДНЈЪфГіФПТМ
        run: mkdir -p $OUTPUT_DIR

      - name: ВНжш 1 - ЩњГЩдчАВЮФАИ
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_BASE_URL: ${{ env.LLM_BASE_URL }}
          LLM_MODEL: ${{ env.LLM_MODEL }}
        run: python scripts/generate_script.py

      - name: ВНжш 2 - ЩњГЩХфвє
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          USE_OPENAI_TTS: ${{ secrets.USE_OPENAI_TTS || 'false' }}
          EDGE_TTS_VOICE: "zh-CN-XiaoxiaoNeural"
        run: python scripts/tts.py

      - name: ВНжш 3 - КЯГЩЪгЦЕ
        env:
          BG_IMAGE: ${{ secrets.BG_IMAGE_URL || '' }}
          BG_MUSIC: ${{ secrets.BG_MUSIC_URL || '' }}
        run: python scripts/compose_video.py

      - name: ВНжш 4 - ЛжИДфЏРРЦїЕЧТМЬЌ
        env:
          DOUYIN_SESSION: ${{ secrets.DOUYIN_SESSION || '' }}
          XIAOHONGSHU_SESSION: ${{ secrets.XIAOHONGSHU_SESSION || '' }}
        run: |
          mkdir -p .sessions
          if [ -n "$DOUYIN_SESSION" ]; then
            echo "$DOUYIN_SESSION" | base64 -d > .sessions/douyin_session.json
            echo "ЖЖвєЕЧТМЬЌвбЛжИД"
          fi
          if [ -n "$XIAOHONGSHU_SESSION" ]; then
            echo "$XIAOHONGSHU_SESSION" | base64 -d > .sessions/xiaohongshu_session.json
            echo "аЁКьЪщЕЧТМЬЌвбЛжИД"
          fi

      - name: ВНжш 5 - ЗЂВМЕНЖрЦНЬЈ
        env:
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA || '' }}
          BILI_JCT: ${{ secrets.BILI_JCT || '' }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY || '' }}
          DOUYIN_SESSION: ${{ secrets.DOUYIN_SESSION || '' }}
          XIAOHONGSHU_SESSION: ${{ secrets.XIAOHONGSHU_SESSION || '' }}
        run: python scripts/publish.py

      - name: ВНжш 6 - ЭЦЫЭЭЈжЊЕНЪжЛњ
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY || '' }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN || '' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '' }}
        run: python scripts/notify.py

      - name: ЩЯДЋГЩЦЗЪгЦЕЃЈArtifactЃЉ
        uses: actions/upload-artifact@v4
        with:
          name: morning-greeting-${{ github.run_id }}
          path: |
            ${{ env.OUTPUT_DIR }}/*.mp4
            ${{ env.OUTPUT_DIR }}/script.json
            .sessions/
            .screenshots/
          retention-days: 7

      - name: ЩЯДЋЕїЪдНиЭМЃЈШчгаЃЉ
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: .screenshots/
          retention-days: 3

      - name: ДђгЁГЩБОБЈИц
        run: |
          if [ -f "$OUTPUT_DIR/script.json" ]; then
            echo "## УПШедчАВГЩБОБЈИц" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            python3 -c "
import json
with open('$OUTPUT_DIR/script.json') as f:
    data = json.load(f)
meta = data.get('_meta', {})
publish = meta.get('publish_results', {})
notify = meta.get('notifications', {})
publish_summary = {
    k: v.get('status', 'unknown') for k, v in publish.items()
} if publish else {}
notify_summary = {
    k: v.get('status', 'unknown') for k, v in notify.items()
} if notify else {}
print(json.dumps({
    'БъЬт': data.get('title', ''),
    'ФЃаЭ': meta.get('model', ''),
    'tokens_змМЦ': meta.get('tokens_total', 0),
    'LLM_ГЩБО_USD': f'\${meta.get(\"cost_usd\", 0):.6f}',
    'TTS_ЗНАИ': meta.get('tts_provider', ''),
    'TTS_ГЩБО_USD': f'\${meta.get(\"tts_cost_usd\", 0):.6f}',
    'змГЩБО_USD': f'\${meta.get(\"cost_usd\", 0) + meta.get(\"tts_cost_usd\", 0):.6f}',
    'змГЩБО_RMB': f'ЃЄ{(meta.get(\"cost_usd\", 0) + meta.get(\"tts_cost_usd\", 0)) * 7.3:.4f}',
    'ЗЂВМНсЙћ': publish_summary,
    'ЭЦЫЭНсЙћ': notify_summary,
}, ensure_ascii=False, indent=2))
" 2>/dev/null || echo 'ГЩБОБЈИцЩњГЩЪЇАм'
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

