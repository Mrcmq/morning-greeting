name: ﾃｿ魹ｽ魹ｽ魹ｽ邁ｲ魹ｽﾔｶ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ櫧｢魹ｽ魹ｽ

on:
  schedule:
    # 魹ｽ魹ｽ魹ｽ魹ｽﾊｱ魹ｽ魹ｽ 05:30 = UTC 21:30
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      city:
        description: 魹ｽ魹ｽ魹ｽ魹ｽ
        required: false
        default: "魹ｽ魹ｽ魹ｽ魹ｽ"
      style:
        description: 魹ｽﾄｰ魹ｽ魹ｽ魹ｽ魹ｽ
        required: false
        default: "魹ｽ魹ｽﾅｯ魹ｽ魹ｽ魹ｽ魹ｽ"
      llm_base_url:
        description: "LLM API 魹ｽ魹ｽﾖｷ魹ｽ魹ｽdeepseek 魹ｽ魹ｽ https://api.deepseek.com/v1魹ｽ魹ｽ"
        required: false
        default: ""
      llm_model:
        description: "LLM ﾄ｣魹ｽﾍ｣魹ｽdeepseek 魹ｽ魹ｽ deepseek-chat魹ｽ魹ｽ"
        required: false
        default: ""
      platforms:
        description: 魹ｽ魹ｽ魹ｽ魹ｽﾆｽﾌｨ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾅｷﾖｸ魹ｽ魹ｽ
        required: false
        default: "bilibili,youtube,douyin,xiaohongshu"

permissions:
  contents: write

env:
  OUTPUT_DIR: ${{ github.workspace }}/output
  CITY: ${{ github.event.inputs.city || '魹ｽ魹ｽ魹ｽ魹ｽ' }}
  STYLE: ${{ github.event.inputs.style || '魹ｽ魹ｽﾅｯ魹ｽ魹ｽ魹ｽ魹ｽ' }}
  LLM_BASE_URL: ${{ github.event.inputs.llm_base_url || secrets.LLM_BASE_URL || 'https://api.openai.com/v1' }}
  LLM_MODEL: ${{ github.event.inputs.llm_model || secrets.LLM_MODEL || 'gpt-4o-mini' }}
  PLATFORMS: ${{ github.event.inputs.platforms || 'bilibili,youtube,douyin,xiaohongshu' }}

jobs:
  generate-morning-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 魹ｽ魹ｽ魹ｽ魹ｽﾖｿ魹ｽ
        uses: actions/checkout@v4

      - name: 魹ｽ魹ｽ魹ｽ魹ｽ Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 魹ｽ魹ｽﾗｰ Python 魹ｽ魹ｽ魹ｽ魹ｽ
        run: |
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium

      - name: 魹ｽ魹ｽﾗｰﾏｵﾍｳ魹ｽ魹ｽ魹ｽ魹ｽ
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ¥
            ffmpeg ¥
            fonts-wqy-microhei ¥
            fonts-wqy-zenhei ¥
            libnss3 libnspr4 libatk-bridge2.0-0 ¥
            libdrm2 libxkbcommon0 libgbm1 ¥
            2>/dev/null

      - name: 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾄｿﾂｼ
        run: mkdir -p $OUTPUT_DIR

      - name: 魹ｽ魹ｽ魹ｽ魹ｽ 1 - 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ邁ｲ魹ｽﾄｰ魹ｽ
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_BASE_URL: ${{ env.LLM_BASE_URL }}
          LLM_MODEL: ${{ env.LLM_MODEL }}
        run: python scripts/generate_script.py

      - name: 魹ｽ魹ｽ魹ｽ魹ｽ 2 - 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          USE_OPENAI_TTS: ${{ secrets.USE_OPENAI_TTS || 'false' }}
          EDGE_TTS_VOICE: "zh-CN-XiaoxiaoNeural"
        run: python scripts/tts.py

      - name: 魹ｽ魹ｽ魹ｽ魹ｽ 3 - 魹ｽﾏｳ魹ｽ魹ｽ魹ｽﾆｵ
        env:
          BG_IMAGE: ${{ secrets.BG_IMAGE_URL || '' }}
          BG_MUSIC: ${{ secrets.BG_MUSIC_URL || '' }}
        run: python scripts/compose_video.py

      - name: 魹ｽ魹ｽ魹ｽ魹ｽ 4 - 魹ｽﾖｸ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾂｼﾌｬ
        env:
          DOUYIN_SESSION: ${{ secrets.DOUYIN_SESSION || '' }}
          XIAOHONGSHU_SESSION: ${{ secrets.XIAOHONGSHU_SESSION || '' }}
        run: |
          mkdir -p .sessions
          if [ -n "$DOUYIN_SESSION" ]; then
            echo "$DOUYIN_SESSION" | base64 -d > .sessions/douyin_session.json
            echo "魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾂｼﾌｬ魹ｽﾑｻﾖｸ魹ｽ"
          fi
          if [ -n "$XIAOHONGSHU_SESSION" ]; then
            echo "$XIAOHONGSHU_SESSION" | base64 -d > .sessions/xiaohongshu_session.json
            echo "ﾐ｡魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾂｼﾌｬ魹ｽﾑｻﾖｸ魹ｽ"
          fi

      - name: 魹ｽ魹ｽ魹ｽ魹ｽ 5 - 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾆｽﾌｨ
        env:
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA || '' }}
          BILI_JCT: ${{ secrets.BILI_JCT || '' }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY || '' }}
          DOUYIN_SESSION: ${{ secrets.DOUYIN_SESSION || '' }}
          XIAOHONGSHU_SESSION: ${{ secrets.XIAOHONGSHU_SESSION || '' }}
        run: python scripts/publish.py

      - name: 魹ｽ魹ｽ魹ｽ魹ｽ 6 - 魹ｽ魹ｽ魹ｽ魹ｽﾍｨﾖｪ魹ｽ魹ｽ魹ｽﾖｻ魹ｽ
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY || '' }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN || '' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '' }}
        run: python scripts/notify.py

      - name: 魹ｽﾏｴ魹ｽ魹ｽ魹ｽﾆｷ魹ｽ魹ｽﾆｵ魹ｽ魹ｽArtifact魹ｽ魹ｽ
        uses: actions/upload-artifact@v4
        with:
          name: morning-greeting-${{ github.run_id }}
          path: |
            ${{ env.OUTPUT_DIR }}/*.mp4
            ${{ env.OUTPUT_DIR }}/script.json
            .sessions/
            .screenshots/
          retention-days: 7

      - name: 魹ｽﾏｴ魹ｽ魹ｽ魹ｽ魹ｽﾔｽ魹ｽﾍｼ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾐ｣魹ｽ
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: .screenshots/
          retention-days: 3

      - name: 魹ｽ魹ｽﾓ｡魹ｽﾉｱ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ
        run: |
          if [ -f "$OUTPUT_DIR/script.json" ]; then
            echo "## ﾃｿ魹ｽ魹ｽ魹ｽ邁ｲ魹ｽﾉｱ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            python3 -c "
import json
with open('$OUTPUT_DIR/script.json') as f:
    data = json.load(f)
meta = data.get('_meta', {})
publish = meta.get('publish_results', {})
notify = meta.get('notifications', {})
publish_summary = {
    k: v.get('status', 'unknown') for k, v in publish.items()
} if publish else {}
notify_summary = {
    k: v.get('status', 'unknown') for k, v in notify.items()
} if notify else {}
print(json.dumps({
    '魹ｽ魹ｽ魹ｽ魹ｽ': data.get('title', ''),
    'ﾄ｣魹ｽ魹ｽ': meta.get('model', ''),
    'tokens_魹ｽﾜｼ魹ｽ': meta.get('tokens_total', 0),
    'LLM_魹ｽﾉｱ魹ｽ_USD': f'¥${meta.get(¥"cost_usd¥", 0):.6f}',
    'TTS_魹ｽ魹ｽ魹ｽ魹ｽ': meta.get('tts_provider', ''),
    'TTS_魹ｽﾉｱ魹ｽ_USD': f'¥${meta.get(¥"tts_cost_usd¥", 0):.6f}',
    '魹ｽﾜｳﾉｱ魹ｽ_USD': f'¥${meta.get(¥"cost_usd¥", 0) + meta.get(¥"tts_cost_usd¥", 0):.6f}',
    '魹ｽﾜｳﾉｱ魹ｽ_RMB': f'魹ｽ魹ｽ{(meta.get(¥"cost_usd¥", 0) + meta.get(¥"tts_cost_usd¥", 0)) * 7.3:.4f}',
    '魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ': publish_summary,
    '魹ｽ魹ｽ魹ｽﾍｽ魹ｽ魹ｽ': notify_summary,
}, ensure_ascii=False, indent=2))
" 2>/dev/null || echo '魹ｽﾉｱ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾊｧ魹ｽ魹ｽ'
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

