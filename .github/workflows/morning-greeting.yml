name: 每日早安自动生成与发布

on:
  schedule:
    # 北京时间 05:30 = UTC 21:30
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      city:
        description: 城市
        required: false
        default: "北京"
      style:
        description: 文案风格
        required: false
        default: "温暖治愈"
      platforms:
        description: 发布平台（逗号分隔）
        required: false
        default: "bilibili,youtube,douyin,xiaohongshu"

permissions:
  contents: write

env:
  OUTPUT_DIR: ${{ github.workspace }}/output
  CITY: ${{ github.event.inputs.city || '北京' }}
  STYLE: ${{ github.event.inputs.style || '温暖治愈' }}
  PLATFORMS: ${{ github.event.inputs.platforms || 'bilibili,youtube,douyin,xiaohongshu' }}

jobs:
  generate-morning-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            fonts-wqy-microhei \
            fonts-wqy-zenhei \
            libnss3 libnspr4 libatk-bridge2.0-0 \
            libdrm2 libxkbcommon0 libgbm1 \
            2>/dev/null

      - name: 创建输出目录
        run: mkdir -p $OUTPUT_DIR

      - name: 步骤 1 - 生成早安文案
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_script.py

      - name: 步骤 2 - 生成配音
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          USE_OPENAI_TTS: ${{ secrets.USE_OPENAI_TTS || 'false' }}
          EDGE_TTS_VOICE: "zh-CN-XiaoxiaoNeural"
        run: python scripts/tts.py

      - name: 步骤 3 - 合成视频
        env:
          BG_IMAGE: ${{ secrets.BG_IMAGE_URL || '' }}
          BG_MUSIC: ${{ secrets.BG_MUSIC_URL || '' }}
        run: python scripts/compose_video.py

      - name: 步骤 4 - 恢复浏览器登录态
        env:
          DOUYIN_SESSION: ${{ secrets.DOUYIN_SESSION || '' }}
          XIAOHONGSHU_SESSION: ${{ secrets.XIAOHONGSHU_SESSION || '' }}
        run: |
          mkdir -p .sessions
          if [ -n "$DOUYIN_SESSION" ]; then
            echo "$DOUYIN_SESSION" | base64 -d > .sessions/douyin_session.json
            echo "抖音登录态已恢复"
          fi
          if [ -n "$XIAOHONGSHU_SESSION" ]; then
            echo "$XIAOHONGSHU_SESSION" | base64 -d > .sessions/xiaohongshu_session.json
            echo "小红书登录态已恢复"
          fi

      - name: 步骤 5 - 发布到多平台
        env:
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA || '' }}
          BILI_JCT: ${{ secrets.BILI_JCT || '' }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY || '' }}
          DOUYIN_SESSION: ${{ secrets.DOUYIN_SESSION || '' }}
          XIAOHONGSHU_SESSION: ${{ secrets.XIAOHONGSHU_SESSION || '' }}
        run: python scripts/publish.py

      - name: 步骤 6 - 推送通知到手机
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY || '' }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN || '' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '' }}
        run: python scripts/notify.py

      - name: 上传成品视频（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: morning-greeting-${{ github.run_id }}
          path: |
            ${{ env.OUTPUT_DIR }}/*.mp4
            ${{ env.OUTPUT_DIR }}/script.json
            .sessions/
            .screenshots/
          retention-days: 7

      - name: 上传调试截图（如有）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: .screenshots/
          retention-days: 3

      - name: 打印成本报告
        run: |
          if [ -f "$OUTPUT_DIR/script.json" ]; then
            echo "## 每日早安成本报告" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            python3 -c "
import json
with open('$OUTPUT_DIR/script.json') as f:
    data = json.load(f)
meta = data.get('_meta', {})
publish = meta.get('publish_results', {})
notify = meta.get('notifications', {})
publish_summary = {
    k: v.get('status', 'unknown') for k, v in publish.items()
} if publish else {}
notify_summary = {
    k: v.get('status', 'unknown') for k, v in notify.items()
} if notify else {}
print(json.dumps({
    '标题': data.get('title', ''),
    '模型': meta.get('model', ''),
    'tokens_总计': meta.get('tokens_total', 0),
    'LLM_成本_USD': f'\${meta.get(\"cost_usd\", 0):.6f}',
    'TTS_方案': meta.get('tts_provider', ''),
    'TTS_成本_USD': f'\${meta.get(\"tts_cost_usd\", 0):.6f}',
    '总成本_USD': f'\${meta.get(\"cost_usd\", 0) + meta.get(\"tts_cost_usd\", 0):.6f}',
    '总成本_RMB': f'￥{(meta.get(\"cost_usd\", 0) + meta.get(\"tts_cost_usd\", 0)) * 7.3:.4f}',
    '发布结果': publish_summary,
    '推送结果': notify_summary,
}, ensure_ascii=False, indent=2))
" 2>/dev/null || echo '成本报告生成失败'
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
